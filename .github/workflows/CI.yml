name: CI
on:
  push:
    branches: [master]
  pull_request:
jobs:
  ununtu:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - run: dotnet restore src/NetMQ.sln
    - name: build 
      run: dotnet build src/NetMQ.sln /p:Configuration=Release /verbosity:minimal
    - name: test net10.0
      run: dotnet test -v n -p:ParallelizeTestCollections=false --configuration Release --no-build -f net10.0 src/NetMQ.Tests/NetMQ.Tests.csproj
  macos:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      DOTNET_NOLOGO: true
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - run: dotnet restore src/NetMQ.sln
    - name: build
      run: dotnet build src/NetMQ.sln /p:Configuration=Release /verbosity:minimal
    - name: test net10.0
      timeout-minutes: 10
      run: >-
        dotnet test -v n -p:ParallelizeTestCollections=false
        --configuration Release --no-build -f net10.0
        --blame-hang --blame-hang-timeout 90s --blame-hang-dump-type none
        --filter "Category!=Beacon"
        --results-directory TestResults
        src/NetMQ.Tests/NetMQ.Tests.csproj
    - name: upload hang diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: macOS-blame-hang
        path: TestResults/
  windows:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install codecov
      run: |
        choco install opencover.portable 
        choco install codecov
    - run: dotnet restore src/NetMQ.sln
    - name: build 
      run: dotnet build src/NetMQ.sln /p:Configuration=Release /verbosity:minimal
    - name: test net10.0
      timeout-minutes: 10
      run: >-
        dotnet test -v n -p:ParallelizeTestCollections=false
        --configuration Release --no-build -f net10.0
        --blame-hang --blame-hang-timeout 90s --blame-hang-dump-type none
        --results-directory TestResults
        src\NetMQ.Tests\NetMQ.Tests.csproj
    - name: test net472
      timeout-minutes: 10
      run: >-
        dotnet test -v n -p:ParallelizeTestCollections=false
        --configuration Release --no-build -f net472
        --blame-hang --blame-hang-timeout 90s --blame-hang-dump-type none
        --results-directory TestResults
        src\NetMQ.Tests\NetMQ.Tests.csproj
    - name: upload hang diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: windows-blame-hang
        path: TestResults/
    - name: coverage
      timeout-minutes: 10
      run: |
        OpenCover.Console.exe -register:user -target:"C:\Program Files\dotnet\dotnet.exe" -targetargs:"test --no-build --configuration Release -f net10.0 --logger:trx;LogFileName=results.trx /p:DebugType=full --blame-hang --blame-hang-timeout 90s --blame-hang-dump-type none src\NetMQ.Tests\NetMQ.Tests.csproj" -filter:"+[NetMQ*]* -[NetMQ.Tests*]*" -output:".\NetMQ_coverage.xml" -oldStyle
        codecov -f "NetMQ_coverage.xml"
